<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Finance OS — a dark-mode luxury design system. Tokens, components and templates for a broker operating system." />
    <title>Finance OS — Design System</title>

    <!-- Brand faces are self-hosted via @fontsource (imported in main.tsx) -->

    <!-- Set the theme before paint to avoid a flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('fos-theme');
          var v = t === 'light' || t === 'paper' || t === 'dark' ? t : 'dark';
          document.documentElement.setAttribute('data-theme', v);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
